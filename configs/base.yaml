# ==============================================================================
# BASE CONFIG - foundation for all experiments.
# Do not run directly; used as base via inheritance.
# ==============================================================================

experiment_name: base
device: auto           # auto | cuda | cpu
seed: 42

data:
  data_dir: data/data_training
  train_split: 0.8
  num_channels: 6
  seq_length: 400
  normalize: true
  normalization_mode: standard  # 'standard' | 'pu'

  # ============ LINE PARAMETERS (for p.u. normalization) ============
  # Used only when normalization_mode: pu
  line_params:
    Unom_kv: 110.0       # Nominal voltage [kV]
    L_km: 50.0           # Line length [km]
    r1_ohm_km: 0.20046   # Positive sequence resistance [Ohm/km]
    x1_ohm_km: 0.4155    # Positive sequence reactance [Ohm/km]

# ============ SIGNAL PREPROCESSING ============
preprocessing:
  butterworth_enabled: false
  butterworth_cutoff: 10.0   # Cutoff frequency in Hz (typically 5-15 Hz)
  butterworth_fs: 1000.0     # Sampling frequency in Hz
  butterworth_order: 2       # Filter order
  butterworth_type: 'highpass'

model:
  type: cnn1d          # cnn1d | dilated_cnn1d | resnet1d
  num_filters: 64
  kernel_size: 5
  dropout: 0.3

training:
  batch_size: 32
  num_epochs: 100
  optimizer: adam      # adam | sgd | adamw
  learning_rate: 0.001
  weight_decay: 1e-5
  loss: smooth_l1      # mse | mae | smooth_l1
  gradient_clip: 1.0

scheduler:
  type: cosine         # cosine | linear | exponential | None
  warmup_epochs: 5

early_stopping:
  enabled: true
  patience: 15
  min_delta: 1e-4

checkpointing:
  save_dir: checkpoints
  save_best_only: true
  save_every_n_epochs: 10

logging:
  log_dir: logs
  log_every_n_batches: 50
