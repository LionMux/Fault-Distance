# =====================================================================
# BASE CONFIG - foundation for all experiments.
# Do not run directly; used as base via inheritance.
# =====================================================================

experiment_name: base
device: auto          # auto | cuda | cpu
seed: 42

data:
  data_dir: data/data_training
  train_split: 0.8
  num_channels: 6
  seq_length: 400
  normalize: true

model:
  type: cnn1d          # cnn1d | dilated_cnn1d | resnet1d
  num_filters: 64
  kernel_size: 5
  dropout: 0.3

training:
  batch_size: 32
  num_epochs: 150
  optimizer: adam      # adam | adamw | sgd
  learning_rate: 0.001
  weight_decay: 0.00001
  loss: smooth_l1      # smooth_l1 | mse | mae
  gradient_clip: 1.0

scheduler:
  type: cosine         # cosine | linear | exponential | null
  warmup_epochs: 5

early_stopping:
  enabled: true
  patience: 15
  min_delta: 0.0001

checkpointing:
  save_dir: checkpoints
  save_best_only: true
  save_every_n_epochs: 10

logging:
  log_dir: logs
  log_every_n_batches: 50

# --- Parameters specific to scripts/augment_and_train.py ---
augmentation:
  input_dir: data/data_training
  train_aug_dir: data/data_augmented_train
  val_dir: data/data_val
  skip_augmentation: false
