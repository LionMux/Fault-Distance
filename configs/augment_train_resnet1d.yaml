# Run: python scripts/augment_and_train.py --config configs/augment_train_resnet1d.yaml
experiment_name: augment_train_resnet1d_v1

model:
  type: resnet1d
  num_filters: 128
  dropout: 0.2

training:
  num_epochs: 150
  batch_size: 32
  learning_rate: 0.0005
  optimizer: adamw

scheduler:
  type: cosine

augmentation:
  input_dir: data/data_training
  train_aug_dir: data/data_augmented_train
  val_dir: data/data_val
  skip_augmentation: false
